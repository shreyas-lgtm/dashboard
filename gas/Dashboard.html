<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Artila Procurement Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#09090b;--surface:#111115;--card:#18181c;--card-hi:#1e1e24;
  --border:rgba(255,255,255,.07);--border-hi:rgba(255,255,255,.13);
  --text:#f0f0f2;--text2:#9898a8;--text3:#60606e;--text4:#38383f;
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,.1);--amber-bd:rgba(245,158,11,.22);
  --red:#f43f5e;--red-bg:rgba(244,63,94,.08);--red-bd:rgba(244,63,94,.22);
  --green:#10b981;--green-bg:rgba(16,185,129,.08);--green-bd:rgba(16,185,129,.22);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,.08);--blue-bd:rgba(59,130,246,.22);
  --yellow:#eab308;--yellow-bg:rgba(234,179,8,.08);--yellow-bd:rgba(234,179,8,.22);
  --purple:#a855f7;--purple-bg:rgba(168,85,247,.08);--purple-bd:rgba(168,85,247,.22);
  --cyan:#06b6d4;--cyan-bg:rgba(6,182,212,.08);--cyan-bd:rgba(6,182,212,.22);
  --teal:#14b8a6;--teal-bg:rgba(20,184,166,.08);
  --orange:#f97316;--orange-bg:rgba(249,115,22,.08);--orange-bd:rgba(249,115,22,.22);
  --sky:#90CAF9;--sky-bg:rgba(144,202,249,.08);
  --shadow:0 1px 3px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.04);
  --shadow-hi:0 4px 16px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.07);
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  --r:10px;--rs:6px;--rl:14px;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased;font-size:14px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text4);border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── LOADER ──────────────────────────────── */
#loader{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px}
.spinner{width:28px;height:28px;border:2px solid var(--border-hi);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite}
.loader-txt{font:500 11px/1 var(--mono);color:var(--text3);letter-spacing:2px}
#app{display:none;padding:24px 28px 56px;max-width:1440px;margin:0 auto}

/* ── HEADER ──────────────────────────────── */
.hdr{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.hdr-brand{font:500 10px/1 var(--mono);color:var(--amber);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;opacity:.8}
.hdr-title{font:700 22px/1.1 var(--font);color:var(--text);letter-spacing:-.4px}
.hdr-right{display:flex;align-items:center;gap:10px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2.5s ease infinite;flex-shrink:0}
.ts{font:400 12px var(--font);color:var(--text3)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--rs);font:500 12px var(--font);cursor:pointer;border:1px solid;transition:all .15s;letter-spacing:-.01em}
.btn-amber{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}
.btn-amber:hover{background:rgba(245,158,11,.17);box-shadow:0 0 0 1px var(--amber-bd)}
.btn.spinning{opacity:.5;pointer-events:none}
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.sec-lbl{font:600 11px/1 var(--font);color:var(--text3);letter-spacing:.3px;text-transform:uppercase}
.sec-line{flex:1;height:1px;background:var(--border)}

/* ── CARD BASE ───────────────────────────── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow)}

/* ── APPROVAL PIPELINE ───────────────────── */
.appr-wrap{margin-bottom:14px;animation:fadeUp .35s ease}
.appr-nodes{display:flex;overflow-x:auto;gap:0;align-items:stretch}
.appr-node{flex:1;min-width:140px;padding:20px 16px;text-align:center;position:relative;border-right:1px solid var(--border);transition:background .15s}
.appr-node:last-child{border-right:none}
.appr-node:hover{background:var(--card-hi)}
.an-icon{font-size:18px;margin-bottom:10px;display:block}
.an-num{font:700 32px/1 var(--mono);font-feature-settings:"tnum";letter-spacing:-1px;margin-bottom:5px}
.an-lbl{font:600 10px/1 var(--font);color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.an-sub{font:400 11px var(--font);color:var(--text3)}
.an-bar-track{width:60px;height:3px;background:var(--border-hi);border-radius:2px;margin:12px auto 0;overflow:hidden}
.an-bar{height:100%;border-radius:2px;transition:width .7s ease}
.appr-arrow{display:none}/* arrows removed in favour of divider lines */
.appr-chips{display:flex;gap:6px;padding:12px 18px;flex-wrap:wrap;border-top:1px solid var(--border);background:rgba(0,0,0,.15)}
.chip{font:500 11px/1 var(--font);padding:5px 11px;border-radius:20px;border:1px solid;display:inline-flex;align-items:center;gap:5px}
.chip-amber{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}
.chip-red{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.chip-yellow{background:var(--yellow-bg);border-color:var(--yellow-bd);color:var(--yellow)}
.chip-purple{background:var(--purple-bg);border-color:var(--purple-bd);color:var(--purple)}
.chip-dim{background:transparent;border-color:var(--border-hi);color:var(--text3)}

/* ── STAT ROW ────────────────────────────── */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;position:relative;overflow:hidden;box-shadow:var(--shadow);animation:fadeUp .35s ease both;transition:transform .15s,border-color .15s}
.stat-card:hover{transform:translateY(-1px);border-color:var(--border-hi)}
.stat-card.s-alert{border-color:var(--red-bd)}
.stat-card.s-alert::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--red);border-radius:var(--r) var(--r) 0 0}
.stat-card.s-warn{border-color:var(--amber-bd)}
.stat-card.s-warn::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--amber);border-radius:var(--r) var(--r) 0 0}
.stat-card.s-info{border-color:var(--blue-bd)}
.stat-card.s-info::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--blue);border-radius:var(--r) var(--r) 0 0}
.stat-icon{font-size:16px;margin-bottom:8px;display:block}
.stat-lbl{font:500 10px/1 var(--font);color:var(--text3);letter-spacing:.3px;margin-bottom:6px;text-transform:uppercase}
.stat-val{font:700 28px/1 var(--mono);font-feature-settings:"tnum";letter-spacing:-1px}

/* ── PIPELINE STAGES ─────────────────────── */
.pipe-wrap{animation:fadeUp .35s ease;margin-bottom:14px}
.pipe-scroll{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 8px;align-items:stretch}
.stage-card{flex:0 0 auto;min-width:100px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 10px 10px;text-align:center;cursor:pointer;transition:all .15s;position:relative;display:flex;flex-direction:column;align-items:center;box-shadow:var(--shadow)}
.stage-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-hi);border-color:var(--border-hi)}
.stage-card.active{box-shadow:0 0 0 2px currentColor}
.sc-icon{font-size:20px;margin-bottom:8px;display:block}
.sc-num{font:700 22px/1 var(--mono);font-feature-settings:"tnum";letter-spacing:-.5px;margin-bottom:5px}
.sc-lbl{font:500 10px/1 var(--font);color:var(--text3);letter-spacing:.2px;white-space:nowrap;margin-bottom:10px;text-transform:uppercase}
.sc-bar-track{width:100%;height:3px;background:var(--border-hi);border-radius:2px;overflow:hidden;margin-top:auto}
.sc-bar{height:100%;border-radius:2px;transition:width .6s ease}
.sc-sla{position:absolute;top:-5px;right:-5px;min-width:16px;height:16px;border-radius:8px;padding:0 3px;background:var(--red);font:700 9px var(--mono);color:#fff;display:none;align-items:center;justify-content:center;border:2px solid var(--bg)}
.sc-sla.show{display:flex}
.sc-pending_requester{color:var(--yellow)}.sc-pending_sourcing{color:var(--orange)}.sc-sourcing{color:var(--amber)}.sc-quotation{color:var(--blue)}.sc-ordered{color:var(--cyan)}.sc-paid{color:var(--green)}.sc-in_transit{color:var(--purple)}.sc-delivered{color:var(--teal)}.sc-handed_over{color:var(--sky)}.sc-cancelled{color:var(--text3)}.sc-pend_appr{color:var(--yellow)}

/* ── TABS ────────────────────────────────── */
.tab-bar{display:flex;gap:1px;margin-bottom:18px;overflow-x:auto;padding:4px;background:var(--surface);border-radius:var(--r);border:1px solid var(--border)}
.tab{padding:8px 16px;font:500 12px/1 var(--font);color:var(--text3);cursor:pointer;border-radius:var(--rs);white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:7px;letter-spacing:-.01em}
.tab:hover{color:var(--text);background:var(--card-hi)}
.tab.active{color:var(--text);background:var(--card);box-shadow:var(--shadow)}
.tab.active{font-weight:600}
.tc{font:600 10px/1 var(--mono);padding:2px 7px;border-radius:10px;background:var(--border-hi);color:var(--text3)}
.tab.active .tc{background:var(--amber-bg);color:var(--amber)}
.tab.has-alert .tc{background:var(--red-bg);color:var(--red)}
.panel{display:none}.panel.active{display:block;animation:fadeUp .25s ease}

/* ── FILTERS ─────────────────────────────── */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.search-box{padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font:400 13px var(--font);outline:none;min-width:220px;transition:border-color .15s;box-shadow:var(--shadow)}
.search-box::placeholder{color:var(--text3)}
.search-box:focus{border-color:var(--amber-bd);box-shadow:0 0 0 3px rgba(245,158,11,.08)}
.fbtn{padding:7px 13px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);color:var(--text3);font:500 12px var(--font);cursor:pointer;transition:all .15s;white-space:nowrap;box-shadow:var(--shadow)}
.fbtn:hover{border-color:var(--border-hi);color:var(--text)}
.fbtn.active{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}
.sel{padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font:400 12px var(--font);outline:none;cursor:pointer;box-shadow:var(--shadow)}
.sel:focus{border-color:var(--amber-bd)}

/* ── ITEM CARDS ──────────────────────────── */
.item-list{display:flex;flex-direction:column;gap:6px}
.item-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);transition:border-color .15s,transform .12s,box-shadow .15s}
.item-card:hover{border-color:var(--border-hi);transform:translateY(-1px);box-shadow:var(--shadow-hi)}
.item-card.urg-critical{border-left:3px solid var(--red)}
.item-card.urg-high{border-left:3px solid var(--amber)}
.item-card.urg-normal{border-left:3px solid var(--blue)}
.item-card.urg-planned{border-left:3px solid var(--green)}
.item-card.has-sla{border-top-color:rgba(234,179,8,.4)}
.item-card.is-critical{border-top-color:rgba(244,63,94,.35)}
.item-hdr{display:grid;grid-template-columns:1fr auto;gap:12px;padding:14px 16px;cursor:pointer;align-items:start}
.item-hdr:hover .item-name{color:var(--amber)}
.item-tags{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.item-name{font:600 14px/1.4 var(--font);color:var(--text);margin-bottom:4px}
.item-name .qty{font:400 12px var(--mono);color:var(--text3);margin-left:8px;font-feature-settings:"tnum"}
.item-name .pr{font:400 11px var(--mono);color:var(--text4);margin-left:6px}
.item-just{font:400 12px var(--font);color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:560px;margin-bottom:5px;line-height:1.4}
.item-meta{display:flex;gap:14px;flex-wrap:wrap}
.item-meta span{font:400 11px var(--font);color:var(--text3)}
.item-meta .eta-v{color:var(--cyan)}
.item-meta .no-vendor{color:var(--red)}
.item-time{font:400 11px var(--mono);color:var(--text4);text-align:right;white-space:nowrap;padding-top:2px;min-width:88px;font-feature-settings:"tnum"}
.item-body{display:none;border-top:1px solid var(--border);padding:16px;background:rgba(0,0,0,.2)}
.item-body.open{display:block}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:12px;margin-bottom:12px}
.dc-label{font:500 9px/1 var(--mono);color:var(--text3);letter-spacing:1px;margin-bottom:4px;text-transform:uppercase}
.dc-val{font:400 13px var(--font);color:var(--text);line-height:1.4}
.dc-val.mono{font-family:var(--mono);font-size:12px}
.just-full{font:400 13px var(--font);color:var(--text2);line-height:1.7;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}

/* ── BADGES & PILLS ──────────────────────── */
.badge{font:600 9px/1 var(--font);padding:3px 8px;border-radius:4px;letter-spacing:.5px;display:inline-block;text-transform:uppercase}
.badge.critical{background:var(--red);color:#fff}
.badge.high{background:var(--amber);color:#111}
.badge.normal{background:var(--blue);color:#fff}
.badge.planned{background:var(--green);color:#111}

.spill{font:500 11px/1 var(--font);padding:4px 10px;border-radius:20px;border:1px solid;display:inline-flex;align-items:center;gap:4px}
.sp-pending_requester{background:var(--yellow-bg);border-color:var(--yellow-bd);color:var(--yellow)}
.sp-pending_sourcing{background:var(--orange-bg);border-color:var(--orange-bd);color:var(--orange)}
.sp-sourcing{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}
.sp-quotation{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue)}
.sp-ordered{background:var(--cyan-bg);border-color:var(--cyan-bd);color:var(--cyan)}
.sp-paid{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}
.sp-in_transit{background:var(--purple-bg);border-color:var(--purple-bd);color:var(--purple)}
.sp-delivered{background:var(--teal-bg);border-color:rgba(20,184,166,.25);color:var(--teal)}
.sp-handed_over{background:var(--sky-bg);border-color:rgba(144,202,249,.2);color:var(--sky)}
.sp-cancelled{background:transparent;border-color:var(--border-hi);color:var(--text3)}
.sp-rejected{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.sp-reverify{background:var(--purple-bg);border-color:var(--purple-bd);color:var(--purple)}
.sp-pending_founder{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}
.sp-pending_dept{background:var(--yellow-bg);border-color:var(--yellow-bd);color:var(--yellow)}
.sp-dept_rejected{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}

.sla-flag{font:500 11px/1 var(--font);padding:4px 10px;border-radius:4px;display:inline-block;margin-top:5px;border:1px solid}
.sla-flag.sourcing{background:var(--yellow-bg);border-color:var(--yellow-bd);color:var(--yellow)}
.sla-flag.payment,.sla-flag.payment_slow{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}
.sla-flag.transit{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}

.team-tag{font:400 10px/1 var(--mono);padding:3px 8px;border:1px solid var(--border-hi);border-radius:4px;color:var(--text3)}

/* ── APPROVAL STEPS ──────────────────────── */
.appr-step{font:500 10px/1 var(--font);padding:4px 9px;border-radius:4px;border:1px solid;display:inline-flex;align-items:center;gap:4px}
.as-ok{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}
.as-pend{background:var(--yellow-bg);border-color:var(--yellow-bd);color:var(--yellow)}
.as-rej{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.as-founder{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}
.as-arr{color:var(--text4);font-size:11px;margin:0 1px}

/* ── INSIGHT BOX ─────────────────────────── */
.insight{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--amber);border-radius:var(--r);padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow)}
.insight-title{font:600 10px/1 var(--font);color:var(--amber);letter-spacing:1px;margin-bottom:12px;text-transform:uppercase}
.insight-line{font:400 13px/1 var(--font);color:var(--text);line-height:2;display:flex;align-items:baseline;gap:7px}
.il-dot{width:4px;height:4px;border-radius:50%;background:var(--text3);flex-shrink:0;margin-top:8px}
.n{font:600 13px/1 var(--mono);font-feature-settings:"tnum"}
.n.r{color:var(--red)}.n.y{color:var(--yellow)}.n.c{color:var(--cyan)}.n.g{color:var(--green)}.n.o{color:var(--amber)}.n.p{color:var(--purple)}
.act{color:var(--amber);font-weight:600}

/* ── BUCKETS ─────────────────────────────── */
.bucket{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px;box-shadow:var(--shadow);animation:fadeUp .35s ease both}
.bucket.b-alert{border-left:3px solid var(--red)}
.bucket.b-warn{border-left:3px solid var(--amber)}
.bucket.b-cyan{border-left:3px solid var(--cyan)}
.bucket.b-purple{border-left:3px solid var(--purple)}
.bucket-hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;cursor:pointer;transition:background .15s}
.bucket-hdr:hover{background:var(--card-hi)}
.bucket-left{display:flex;align-items:center;gap:12px}
.bucket-icon{font-size:20px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;flex-shrink:0}
.bucket-title{font:600 14px/1.3 var(--font);color:var(--text)}
.bucket-sub{font:400 12px var(--font);color:var(--text3);margin-top:2px}
.bucket-right{display:flex;align-items:center;gap:12px}
.bucket-cnt{font:700 26px/1 var(--mono);font-feature-settings:"tnum";letter-spacing:-.5px}
.bc-r{color:var(--red)}.bc-y{color:var(--yellow)}.bc-c{color:var(--cyan)}.bc-p{color:var(--purple)}.bc-g{color:var(--green)}.bc-d{color:var(--text4)}
.bucket-toggle{font:400 13px/1 var(--mono);color:var(--text3);width:24px;height:24px;border:1px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center}
.bucket-body{display:none;border-top:1px solid var(--border)}
.bucket-body.open{display:block}
.brow{padding:11px 18px;border-bottom:1px solid rgba(255,255,255,.03);display:flex;justify-content:space-between;align-items:center;transition:background .12s}
.brow:hover{background:var(--card-hi)}
.brow:last-child{border-bottom:none}
.brow-name{font:500 13px/1.3 var(--font);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:340px}
.brow-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:3px;align-items:center}
.brow-meta span{font:400 10px/1 var(--font);color:var(--text3)}
.brow-right{font:500 12px/1 var(--mono);color:var(--text3);text-align:right;white-space:nowrap;min-width:80px;font-feature-settings:"tnum"}
.brow-days.over{color:var(--red)}.brow-days.warn{color:var(--yellow)}.brow-days.ok{color:var(--green)}

/* ── VENDOR CARDS ────────────────────────── */
.vendor-card{background:var(--card);border:1px solid var(--red-bd);border-left:3px solid var(--red);border-radius:var(--r);padding:16px 18px;margin-bottom:8px;box-shadow:var(--shadow);animation:fadeUp .35s ease both}
.vc-name{font:600 15px var(--font);color:var(--text);margin-bottom:5px}
.vc-stats{font:400 12px var(--font);color:var(--text3);margin-bottom:10px}
.vc-stats strong{color:var(--red)}
.vc-item{font:400 11px var(--mono);color:var(--text3);padding:6px 0;border-top:1px solid var(--border)}
.vc-item:first-child{border-top:none}
.vc-late{color:var(--red);font-weight:600}

/* ── EMPTY ───────────────────────────────── */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:38px;margin-bottom:12px;opacity:.25}
.empty-text{font:500 14px var(--font);color:var(--text3);margin-bottom:4px}
.empty-sub{font:400 12px var(--font);color:var(--text4)}

/* ── FOOTER ──────────────────────────────── */
.footer{margin-top:32px;text-align:center;font:400 11px var(--font);color:var(--text4);padding:14px}

/* ── RESPONSIVE ──────────────────────────── */
@media(max-width:640px){
  #app{padding:14px 14px 36px}
  .hdr-title{font-size:18px}
  .appr-node{min-width:110px;padding:14px 10px}
  .an-num{font-size:26px}
  .stat-val{font-size:24px}
  .stage-card{min-width:82px}
  .sc-num{font-size:18px}
}
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <div class="loader-txt">LOADING PROCUREMENT DATA</div>
</div>

<div id="app">

  <!-- HEADER -->
  <div class="hdr">
    <div>
      <div class="hdr-brand">Artila Robotics</div>
      <div class="hdr-title">Procurement Dashboard</div>
    </div>
    <div class="hdr-right">
      <div style="display:flex;align-items:center;gap:7px">
        <div class="live-dot"></div>
        <span class="ts" id="ts">—</span>
      </div>
      <button class="btn btn-amber" id="rbtn" onclick="doRefresh()">
        <span id="rbtn-icon">↻</span> Refresh
      </button>
    </div>
  </div>

  <!-- APPROVAL PIPELINE -->
  <div class="appr-wrap">
    <div class="sec-hdr"><span class="sec-lbl">Approval Pipeline</span><div class="sec-line"></div></div>
    <div class="card" style="overflow:hidden">
      <div class="appr-nodes" id="appr-nodes"></div>
      <div class="appr-chips" id="appr-chips"></div>
    </div>
  </div>

  <!-- STAT ROW -->
  <div class="stat-row" id="stat-row"></div>

  <!-- PIPELINE STAGES -->
  <div class="pipe-wrap">
    <div class="sec-hdr"><span class="sec-lbl">Pipeline Stages</span><span style="font:400 11px var(--font);color:var(--text4);margin-left:6px">· click to filter</span><div class="sec-line"></div></div>
    <div class="pipe-scroll" id="pipe-stages"></div>
  </div>

  <!-- TABS -->
  <div class="tab-bar">
    <div class="tab active" data-tab="overview" onclick="switchTab(this)">Overview</div>
    <div class="tab" data-tab="items" onclick="switchTab(this)">All Items <span class="tc" id="tc-items">0</span></div>
    <div class="tab" data-tab="pending" onclick="switchTab(this)">Pending Approval <span class="tc" id="tc-pending">0</span></div>
    <div class="tab" data-tab="rejected" onclick="switchTab(this)">Rejected / Reverify <span class="tc" id="tc-rejected">0</span></div>
    <div class="tab" data-tab="sla" onclick="switchTab(this)">SLA Flags <span class="tc" id="tc-sla">0</span></div>
    <div class="tab" data-tab="vendors" onclick="switchTab(this)">Vendor Issues <span class="tc" id="tc-vendors">0</span></div>
    <div class="tab" data-tab="completed" onclick="switchTab(this)">Completed <span class="tc" id="tc-completed">0</span></div>
  </div>

  <!-- OVERVIEW -->
  <div class="panel active" id="panel-overview">
    <div class="insight" id="insight-box"></div>
    <div id="overview-buckets"></div>
  </div>

  <!-- ALL ITEMS -->
  <div class="panel" id="panel-items">
    <div class="filters">
      <input type="text" class="search-box" id="q-items" placeholder="Search PR, item, vendor, team…" oninput="renderAllItems()">
      <button class="fbtn active" data-urg="all" onclick="setUrgF(this)">All</button>
      <button class="fbtn" data-urg="critical" onclick="setUrgF(this)">Critical</button>
      <button class="fbtn" data-urg="high" onclick="setUrgF(this)">High</button>
      <button class="fbtn" data-urg="normal" onclick="setUrgF(this)">Normal</button>
      <button class="fbtn" data-urg="planned" onclick="setUrgF(this)">Planned</button>
      <select class="sel" id="team-f" onchange="renderAllItems()"><option value="all">All Teams</option></select>
      <select class="sel" id="stage-f" onchange="renderAllItems()">
        <option value="all">All Stages</option>
        <option value="pending_requester">Pending Requester</option>
        <option value="pending_sourcing">Pending Sourcing</option>
        <option value="sourcing">Sourcing</option>
        <option value="quotation">Quotation</option>
        <option value="ordered">Ordered</option>
        <option value="paid">Paid</option>
        <option value="in_transit">In Transit</option>
      </select>
    </div>
    <div class="item-list" id="list-items"></div>
  </div>

  <!-- PENDING APPROVAL -->
  <div class="panel" id="panel-pending">
    <div class="filters">
      <input type="text" class="search-box" id="q-pending" placeholder="Search…" oninput="renderPending()">
      <button class="fbtn active" data-appr="all" onclick="setApprF(this)">All</button>
      <button class="fbtn" data-appr="pending_dept" onclick="setApprF(this)">Needs Dept</button>
      <button class="fbtn" data-appr="pending_founder" onclick="setApprF(this)">Needs Founder</button>
      <button class="fbtn" data-appr="dept_rejected" onclick="setApprF(this)">Dept Rejected</button>
    </div>
    <div class="item-list" id="list-pending"></div>
  </div>

  <!-- REJECTED -->
  <div class="panel" id="panel-rejected">
    <div class="filters">
      <input type="text" class="search-box" id="q-rejected" placeholder="Search…" oninput="renderRejected()">
      <button class="fbtn active" data-rj="all" onclick="setRjF(this)">All</button>
      <button class="fbtn" data-rj="rejected" onclick="setRjF(this)">Rejected</button>
      <button class="fbtn" data-rj="reverify" onclick="setRjF(this)">Reverify</button>
    </div>
    <div class="item-list" id="list-rejected"></div>
  </div>

  <!-- SLA -->
  <div class="panel" id="panel-sla"><div class="item-list" id="list-sla"></div></div>

  <!-- VENDORS -->
  <div class="panel" id="panel-vendors"><div id="vendor-cards"></div></div>

  <!-- COMPLETED -->
  <div class="panel" id="panel-completed">
    <div class="filters">
      <input type="text" class="search-box" id="q-completed" placeholder="Search…" oninput="renderCompleted()">
      <button class="fbtn active" data-cmp="all" onclick="setCmpF(this)">All</button>
      <button class="fbtn" data-cmp="handed_over" onclick="setCmpF(this)">Handed Over</button>
      <button class="fbtn" data-cmp="delivered" onclick="setCmpF(this)">Delivered</button>
      <button class="fbtn" data-cmp="cancelled" onclick="setCmpF(this)">Cancelled</button>
    </div>
    <div class="item-list" id="list-completed"></div>
  </div>

  <div class="footer" id="footer">Artila Robotics · Procurement Operations · Auto-refresh every 30s</div>
</div>

<script>
var D={activeItems:[],pendingItems:[],rejectedItems:[],completedItems:[],vendorFlags:[],approvalBreakdown:{},stageCounts:{},totalRequests:0};
var STAGE_FILTER='all',urg_f='all',appr_f='all',rj_f='all',cmp_f='all';
var TIMER=null,REFRESH_MS=30000;

var STAGES=[
  {key:'pending_requester',icon:'📋',short:'Pend Req'},
  {key:'pending_sourcing', icon:'⏳',short:'Pend Src'},
  {key:'sourcing',         icon:'🔍',short:'Sourcing'},
  {key:'quotation',        icon:'💬',short:'Quotation'},
  {key:'ordered',          icon:'📦',short:'Ordered'},
  {key:'paid',             icon:'💳',short:'Paid'},
  {key:'in_transit',       icon:'🚚',short:'In Transit'},
  {key:'delivered',        icon:'📬',short:'Delivered'},
  {key:'handed_over',      icon:'✅',short:'Handed Over'},
  {key:'cancelled',        icon:'🚫',short:'Cancelled'}
];
var SL={};STAGES.forEach(function(s){SL[s.key]=s;});
var URG_RANK={CRITICAL:1,HIGH:2,NORMAL:3,PLANNED:4};

function esc(s){var d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}
function getUrg(v){if(!v)return'NORMAL';v=v.toLowerCase();if(v.indexOf('critical')>=0)return'CRITICAL';if(v.indexOf('high')>=0)return'HIGH';if(v.indexOf('planned')>=0||v.indexOf('future')>=0)return'PLANNED';return'NORMAL';}
function urgL(v){return getUrg(v).toLowerCase();}
function timeAgo(ds){if(!ds)return'';try{var d,p=ds.match(/(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2}):(\d{2})/);if(p)d=new Date(p[3],p[2]-1,p[1],p[4],p[5],p[6]);else d=new Date(ds);if(isNaN(d.getTime()))return'';var m=Math.floor((Date.now()-d.getTime())/60000);if(m<60)return m+'m ago';if(m<1440)return Math.floor(m/60)+'h ago';return Math.floor(m/1440)+'d ago';}catch(e){return'';}}
function pct(n,t){return t?Math.round(n/t*100)+'%':'0%';}
function sum(arr){return arr.reduce(function(a,b){return a+b;},0);}

function loadData(){
  var b=document.getElementById('rbtn');b.classList.add('spinning');document.getElementById('rbtn-icon').textContent='↻';
  google.script.run.withSuccessHandler(onData).withFailureHandler(onErr).getDashboardData();
}
function onData(r){
  document.getElementById('loader').style.display='none';
  document.getElementById('app').style.display='block';
  var b=document.getElementById('rbtn');b.classList.remove('spinning');document.getElementById('rbtn-icon').textContent='↻';
  D=r;D.activeItems=D.activeItems||[];D.pendingItems=D.pendingItems||[];
  D.rejectedItems=D.rejectedItems||[];D.completedItems=D.completedItems||[];
  D.vendorFlags=D.vendorFlags||[];D.approvalBreakdown=D.approvalBreakdown||{};D.stageCounts=D.stageCounts||{};
  document.getElementById('ts').textContent='Updated '+new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  renderApproval();renderStats();renderPipeline();buildTeamFilter();
  renderOverview();renderAllItems();renderPending();renderRejected();renderSLA();renderVendors();renderCompleted();
  updateTabs();scheduleNext();
}
function onErr(e){var b=document.getElementById('rbtn');b.classList.remove('spinning');scheduleNext(15000);}
function doRefresh(){if(TIMER)clearTimeout(TIMER);loadData();}
function scheduleNext(ms){if(TIMER)clearTimeout(TIMER);TIMER=setTimeout(loadData,ms||REFRESH_MS);}

function switchTab(el){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});el.classList.add('active');
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.getElementById('panel-'+el.getAttribute('data-tab')).classList.add('active');
}
function updateTabs(){
  var sla=D.activeItems.filter(function(r){return r.slaFlag;}).length;
  document.getElementById('tc-items').textContent=D.activeItems.length;
  document.getElementById('tc-pending').textContent=D.pendingItems.length;
  document.getElementById('tc-rejected').textContent=D.rejectedItems.length;
  document.getElementById('tc-sla').textContent=sla;
  document.getElementById('tc-vendors').textContent=D.vendorFlags.length;
  document.getElementById('tc-completed').textContent=D.completedItems.length;
  ['sla','rejected','vendors'].forEach(function(t){
    var el=document.querySelector('[data-tab="'+t+'"]');
    var count=t==='sla'?sla:t==='rejected'?D.rejectedItems.length:D.vendorFlags.length;
    if(count>0)el.classList.add('has-alert');else el.classList.remove('has-alert');
  });
}

function renderApproval(){
  var ab=D.approvalBreakdown,total=ab.total||0;
  var active=D.activeItems.length;
  var completed=D.completedItems.filter(function(r){return r.statusClass==='handed_over'||r.statusClass==='delivered';}).length;
  var maxVal=Math.max(total,1);

  var nodes=[
    {num:total,          lbl:'Submitted',     sub:'Total requests',          color:'var(--text)',  icon:'📝'},
    {num:ab.deptApproved||0,lbl:'Dept Approved',sub:pct(ab.deptApproved||0,total)+' approved',   color:'var(--yellow)',icon:'🏢'},
    {num:ab.founderApproved||0,lbl:'Founder Approved',sub:pct(ab.founderApproved||0,total)+' approved',color:'var(--green)',icon:'✅'},
    {num:active,         lbl:'Active',         sub:'Working items',           color:'var(--cyan)',  icon:'⚡'},
    {num:completed,      lbl:'Completed',      sub:'Delivered & handed over', color:'var(--sky)',   icon:'🎯'}
  ];

  document.getElementById('appr-nodes').innerHTML=nodes.map(function(n){
    var barW=Math.max(4,Math.round(n.num/maxVal*100));
    return '<div class="appr-node">'+
      '<span class="an-icon">'+n.icon+'</span>'+
      '<div class="an-num" style="color:'+n.color+'">'+n.num+'</div>'+
      '<div class="an-lbl">'+n.lbl+'</div>'+
      '<div class="an-sub">'+n.sub+'</div>'+
      '<div class="an-bar-track"><div class="an-bar" style="width:'+barW+'%;background:'+n.color+'"></div></div>'+
    '</div>';
  }).join('');

  var chips=[];
  if((ab.deptPending||0)>0)chips.push('<span class="chip chip-yellow">⏳ '+(ab.deptPending||0)+' Pending Dept</span>');
  if((ab.founderPending||0)>0)chips.push('<span class="chip chip-amber">⏳ '+(ab.founderPending||0)+' Pending Founder</span>');
  var rej=(ab.founderRejected||0)+(ab.deptRejected||0);
  if(rej>0)chips.push('<span class="chip chip-red">✕ '+rej+' Rejected</span>');
  if((ab.founderReverify||0)>0)chips.push('<span class="chip chip-purple">↺ '+(ab.founderReverify||0)+' Reverify</span>');
  var cancelled=D.completedItems.filter(function(r){return r.statusClass==='cancelled';}).length;
  if(cancelled>0)chips.push('<span class="chip chip-dim">🚫 '+cancelled+' Cancelled</span>');
  document.getElementById('appr-chips').innerHTML=chips.join('')||'<span class="chip chip-dim">No exceptions</span>';
}

function renderStats(){
  var items=D.activeItems,sc=D.stageCounts;
  var crit=items.filter(function(r){return getUrg(r.urgency)==='CRITICAL';}).length;
  var sla=items.filter(function(r){return r.slaFlag;}).length;
  var noV=items.filter(function(r){return !r.vendor&&r.statusClass!=='pending_requester';}).length;
  var pend=(sc.pending_requester||0)+(sc.pending_sourcing||0)+(sc.sourcing||0);

  var stats=[
    {icon:'📊',l:'Active',       v:items.length, color:'var(--text)',     cls:''},
    {icon:'🔴',l:'Critical',     v:crit,         color:'var(--red)',      cls:crit>0?'s-alert':''},
    {icon:'🕐',l:'Pending/Src',  v:pend,         color:'var(--yellow)',   cls:pend>0?'s-warn':''},
    {icon:'💬',l:'Quotation',    v:sc.quotation||0,color:'var(--blue)',   cls:'s-info'},
    {icon:'🚚',l:'In Transit',   v:sc.in_transit||0,color:'var(--purple)',cls:''},
    {icon:'⚠️',l:'SLA Breaches', v:sla,          color:'var(--red)',      cls:sla>0?'s-alert':''},
    {icon:'🏪',l:'No Vendor',    v:noV,          color:'var(--amber)',    cls:noV>0?'s-warn':''},
    {icon:'⏸',l:'Pend Approval',v:D.pendingItems.length,color:'var(--yellow)',cls:D.pendingItems.length>0?'s-warn':''}
  ];
  document.getElementById('stat-row').innerHTML=stats.map(function(s,i){
    return '<div class="stat-card '+s.cls+'" style="animation-delay:'+(i*.04)+'s">'+
      '<span class="stat-icon">'+s.icon+'</span>'+
      '<div class="stat-lbl">'+s.l+'</div>'+
      '<div class="stat-val" style="color:'+s.color+'">'+s.v+'</div>'+
    '</div>';
  }).join('');
}

function renderPipeline(){
  var sc=D.stageCounts,items=D.activeItems;
  var total=sum(STAGES.map(function(s){return sc[s.key]||0;}));
  var slaBySt={};
  items.forEach(function(r){if(r.slaFlag)slaBySt[r.statusClass]=(slaBySt[r.statusClass]||0)+1;});

  var html=STAGES.map(function(s,i){
    var cnt=sc[s.key]||0;
    var slaC=slaBySt[s.key]||0;
    var barW=total>0?Math.max(0,Math.round(cnt/total*100)):0;
    var isAct=STAGE_FILTER===s.key;
    return '<div class="stage-card sc-'+s.key+(isAct?' active':'')+'" onclick="setStageF(\''+s.key+'\')">'+
      '<span class="sc-icon">'+s.icon+'</span>'+
      '<div class="sc-num">'+cnt+'</div>'+
      '<div class="sc-lbl">'+esc(s.short)+'</div>'+
      '<div class="sc-bar-track"><div class="sc-bar" style="width:'+barW+'%;background:currentColor;opacity:.55"></div></div>'+
      '<div class="sc-sla'+(slaC>0?' show':'')+'">'+slaC+'</div>'+
    '</div>';
  }).join('');

  html+='<div class="stage-card sc-pend_appr" onclick="goTab(\'pending\')" style="border-style:dashed">'+
    '<span class="sc-icon">⏸</span>'+
    '<div class="sc-num">'+D.pendingItems.length+'</div>'+
    '<div class="sc-lbl">Pend Appr</div>'+
    '<div class="sc-bar-track"><div class="sc-bar" style="width:30%;background:currentColor;opacity:.45"></div></div>'+
  '</div>';

  document.getElementById('pipe-stages').innerHTML=html;
}

function setStageF(s){
  STAGE_FILTER=(STAGE_FILTER===s)?'all':s;
  renderPipeline();
  document.getElementById('stage-f').value=STAGE_FILTER;
  goTab('items');renderAllItems();
}
function goTab(key){var el=document.querySelector('[data-tab="'+key+'"]');if(el)switchTab(el);}

function buildTeamFilter(){
  var t={};D.activeItems.forEach(function(r){if(r.team)t[r.team]=true;});
  var l=Object.keys(t).sort();var s=document.getElementById('team-f');
  s.innerHTML='<option value="all">All Teams</option>'+l.map(function(x){return'<option value="'+esc(x)+'">'+esc(x)+'</option>';}).join('');
  s.style.display=l.length>1?'':'none';
}

function setUrgF(btn){btn.parentElement.querySelectorAll('[data-urg]').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');urg_f=btn.getAttribute('data-urg');renderAllItems();}
function setApprF(btn){btn.parentElement.querySelectorAll('[data-appr]').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');appr_f=btn.getAttribute('data-appr');renderPending();}
function setRjF(btn){btn.parentElement.querySelectorAll('[data-rj]').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');rj_f=btn.getAttribute('data-rj');renderRejected();}
function setCmpF(btn){btn.parentElement.querySelectorAll('[data-cmp]').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');cmp_f=btn.getAttribute('data-cmp');renderCompleted();}

function cell(l,v,mono){if(!v)return'';return'<div><div class="dc-label">'+esc(l)+'</div><div class="dc-val'+(mono?' mono':'')+'">'+esc(v)+'</div></div>';}
function toggleBody(id){var el=document.getElementById(id);if(el)el.classList.toggle('open');}

function itemCard(r,i){
  var u=getUrg(r.urgency),ul=u.toLowerCase();
  var st=SL[r.statusClass]||{icon:'📋',short:r.statusClass||''};
  var hasSla=!!r.slaFlag;
  var id='cb-'+i+'-'+Math.random().toString(36).slice(2,5);

  var tags='<span class="badge '+ul+'">'+u+'</span>'+
    '<span class="spill sp-'+esc(r.statusClass)+'">'+esc(st.icon)+' '+esc(st.short)+'</span>'+
    (r.team?'<span class="team-tag">'+esc(r.team)+'</span>':'');

  var meta=(r.email?'<span>'+esc(r.email.split('@')[0])+'</span>':'')+
    (r.vendor?'<span>→ '+esc(r.vendor)+'</span>':'<span class="no-vendor">No vendor</span>')+
    (r.estimate?'<span>'+esc(r.estimate)+'</span>':'')+
    (r.approvalDate?'<span>Approved: '+esc(r.approvalDate)+'</span>':'')+
    (r.orderedDate?'<span>Ordered: '+esc(r.orderedDate)+'</span>':'')+
    (r.eta?'<span class="eta-v">ETA: '+esc(r.eta)+'</span>':'');

  var detail='<div class="detail-grid">'+
    cell('PR ID',r.prId,true)+cell('Item',r.item,false)+cell('Quantity',r.quantity,true)+
    cell('Estimate',r.estimate,true)+cell('Part Number',r.partNumber,true)+cell('Vendor',r.vendor,false)+
    cell('Category',r.category,false)+cell('Team',r.team,false)+cell('Urgency',r.urgency,false)+
    cell('Order Status',r.orderStatus,false)+cell('Approval Date',r.approvalDate,true)+
    cell('Ordered Date',r.orderedDate,true)+cell('ETA',r.eta,true)+cell('Lead Time',r.leadTime,true)+
    cell('Dept Approval',r.managerApproval,false)+cell('Founder Approval',r.finalApproval,false)+
  '</div>'+(r.justification?'<div class="just-full">'+esc(r.justification)+'</div>':'');

  return '<div class="item-card urg-'+ul+(hasSla?' has-sla':'')+(u==='CRITICAL'?' is-critical':'')+'" style="animation-delay:'+(i*.018)+'s">'+
    '<div class="item-hdr" onclick="toggleBody(\''+id+'\')">'+
      '<div>'+
        '<div class="item-tags">'+tags+'</div>'+
        '<div class="item-name">'+esc(r.item||'—')+(r.quantity?'<span class="qty">×'+esc(r.quantity)+'</span>':'')+(r.prId?'<span class="pr">'+esc(r.prId)+'</span>':'')+'</div>'+
        (r.justification?'<div class="item-just">'+esc(r.justification)+'</div>':'')+
        (hasSla?'<div class="sla-flag '+esc(r.slaFlagType)+'">⚠ '+esc(r.slaFlag)+'</div>':'')+
        '<div class="item-meta">'+meta+'</div>'+
      '</div>'+
      '<div class="item-time">'+(r.daysSinceApproval>=0?r.daysSinceApproval+'d since appr.':timeAgo(r.timestamp))+'</div>'+
    '</div>'+
    '<div class="item-body" id="'+id+'">'+detail+'</div>'+
  '</div>';
}

function pendingCard(r,i){
  var u=getUrg(r.urgency);
  var dCls=r.approvalState==='dept_rejected'?'as-rej':r.approvalState==='pending_founder'?'as-ok':'as-pend';
  var dLbl=r.approvalState==='dept_rejected'?'✕ Dept Rejected':r.approvalState==='pending_founder'?'✓ Dept OK':'⏳ Needs Dept';
  var id='pc-'+i;
  var detail='<div class="detail-grid">'+cell('PR ID',r.prId,true)+cell('Team',r.team,false)+cell('Estimate',r.estimate,true)+cell('Vendor',r.vendor,false)+cell('Category',r.category,false)+cell('Urgency',r.urgency,false)+cell('Dept Approval',r.managerApproval||'Pending',false)+cell('Founder Approval',r.finalApproval||'Pending',false)+'</div>'+(r.justification?'<div class="just-full">'+esc(r.justification)+'</div>':'');

  return '<div class="item-card urg-'+u.toLowerCase()+'" style="animation-delay:'+(i*.018)+'s">'+
    '<div class="item-hdr" onclick="toggleBody(\''+id+'\')">'+
      '<div>'+
        '<div class="item-tags">'+
          '<span class="badge '+u.toLowerCase()+'">'+u+'</span>'+
          '<span class="appr-step '+dCls+'">'+dLbl+'</span>'+
          (r.approvalState!=='dept_rejected'?'<span class="as-arr">→</span><span class="appr-step as-founder">⏳ Needs Founder</span>':'')+
          (r.team?'<span class="team-tag">'+esc(r.team)+'</span>':'')+
        '</div>'+
        '<div class="item-name">'+esc(r.item||'—')+(r.prId?'<span class="pr">'+esc(r.prId)+'</span>':'')+'</div>'+
        '<div class="item-meta">'+(r.email?'<span>'+esc(r.email.split('@')[0])+'</span>':'')+(r.vendor?'<span>→ '+esc(r.vendor)+'</span>':'')+(r.estimate?'<span>'+esc(r.estimate)+'</span>':'')+'</div>'+
      '</div>'+
      '<div class="item-time">'+timeAgo(r.timestamp)+'</div>'+
    '</div>'+
    '<div class="item-body" id="'+id+'">'+detail+'</div>'+
  '</div>';
}

function renderAllItems(){
  var q=(document.getElementById('q-items').value||'').toLowerCase();
  var team=document.getElementById('team-f').value;
  var stage=document.getElementById('stage-f').value;
  var filtered=D.activeItems.filter(function(r){
    if(urg_f!=='all'&&getUrg(r.urgency).toLowerCase()!==urg_f)return false;
    if(team!=='all'&&(r.team||'').toLowerCase()!==team.toLowerCase())return false;
    if(stage!=='all'&&r.statusClass!==stage)return false;
    if(q){var h=[r.item,r.justification,r.vendor,r.email,r.prId,r.category,r.orderStatus,r.team].map(function(v){return(v||'').toLowerCase();}).join(' ');if(h.indexOf(q)<0)return false;}
    return true;
  }).sort(function(a,b){
    var af=a.slaFlag?0:1,bf=b.slaFlag?0:1;if(af!==bf)return af-bf;
    return(URG_RANK[getUrg(a.urgency)]||3)-(URG_RANK[getUrg(b.urgency)]||3);
  });
  document.getElementById('list-items').innerHTML=filtered.length?filtered.map(itemCard).join(''):emptyHtml('🔍','No items match the filters','Try adjusting the search or stage filter');
  document.getElementById('footer').textContent=filtered.length+' of '+D.activeItems.length+' active items · Auto-refresh 30s';
}

function renderPending(){
  var q=(document.getElementById('q-pending').value||'').toLowerCase();
  var filtered=D.pendingItems.filter(function(r){
    if(appr_f!=='all'&&r.approvalState!==appr_f)return false;
    if(q){var h=[r.item,r.vendor,r.email,r.prId,r.team].map(function(v){return(v||'').toLowerCase();}).join(' ');if(h.indexOf(q)<0)return false;}
    return true;
  }).sort(function(a,b){return(URG_RANK[getUrg(a.urgency)]||3)-(URG_RANK[getUrg(b.urgency)]||3);});
  document.getElementById('list-pending').innerHTML=filtered.length?filtered.map(pendingCard).join(''):emptyHtml('✓','No items pending approval','All requests have been reviewed');
}

function renderRejected(){
  var q=(document.getElementById('q-rejected').value||'').toLowerCase();
  var filtered=D.rejectedItems.filter(function(r){
    if(rj_f!=='all'&&r.statusClass!==rj_f)return false;
    if(q){var h=[r.item,r.vendor,r.email,r.prId,r.team].map(function(v){return(v||'').toLowerCase();}).join(' ');if(h.indexOf(q)<0)return false;}
    return true;
  });
  document.getElementById('list-rejected').innerHTML=filtered.length?filtered.map(function(r,i){
    var u=getUrg(r.urgency);var isRev=r.statusClass==='reverify';var id='rj-'+i;
    var detail='<div class="detail-grid">'+cell('PR ID',r.prId,true)+cell('Team',r.team,false)+cell('Estimate',r.estimate,true)+cell('Vendor',r.vendor,false)+cell('Dept Approval',r.managerApproval||'—',false)+cell('Founder Approval',r.finalApproval||'—',false)+'</div>'+(r.justification?'<div class="just-full">'+esc(r.justification)+'</div>':'');
    return '<div class="item-card urg-'+u.toLowerCase()+' is-critical" style="animation-delay:'+(i*.018)+'s">'+
      '<div class="item-hdr" onclick="toggleBody(\''+id+'\')">'+
        '<div><div class="item-tags"><span class="badge '+u.toLowerCase()+'">'+u+'</span><span class="spill sp-'+r.statusClass+'">'+(isRev?'↺ Reverify':'✕ Rejected')+'</span>'+(r.team?'<span class="team-tag">'+esc(r.team)+'</span>':'')+'</div>'+
        '<div class="item-name">'+esc(r.item||'—')+(r.prId?'<span class="pr">'+esc(r.prId)+'</span>':'')+'</div>'+
        '<div class="item-meta">'+(r.email?'<span>'+esc(r.email.split('@')[0])+'</span>':'')+(r.estimate?'<span>'+esc(r.estimate)+'</span>':'')+'</div></div>'+
        '<div class="item-time">'+timeAgo(r.timestamp)+'</div>'+
      '</div>'+
      '<div class="item-body" id="'+id+'">'+detail+'</div>'+
    '</div>';
  }).join(''):emptyHtml('✓','No rejected or reverify items','');
}

function renderSLA(){
  var f=D.activeItems.filter(function(r){return r.slaFlag;}).sort(function(a,b){return b.slaDaysOver-a.slaDaysOver;});
  document.getElementById('list-sla').innerHTML=f.length?f.map(itemCard).join(''):emptyHtml('✅','No SLA breaches','All items are progressing within SLA');
}

function renderVendors(){
  var el=document.getElementById('vendor-cards');
  if(!D.vendorFlags.length){el.innerHTML=emptyHtml('🤝','No vendor delivery issues','All deliveries arrived on time');return;}
  el.innerHTML=D.vendorFlags.map(function(v,i){
    var avg=Math.round(v.totalDaysLate/v.lateCount);
    return '<div class="vendor-card" style="animation-delay:'+(i*.05)+'s">'+
      '<div class="vc-name">'+esc(v.vendor)+'</div>'+
      '<div class="vc-stats"><strong>'+v.lateCount+' late deliveries</strong> · Avg delay: <strong>'+avg+'d</strong></div>'+
      v.items.map(function(it){return'<div class="vc-item">'+esc(it.prId)+' · '+esc(it.item)+' — ETA: '+esc(it.eta)+' → Arrived: '+esc(it.actualArrival)+' <span class="vc-late">(+'+it.daysLate+'d)</span></div>';}).join('')+
    '</div>';
  }).join('');
}

function renderCompleted(){
  var q=(document.getElementById('q-completed').value||'').toLowerCase();
  var filtered=D.completedItems.filter(function(r){
    if(cmp_f!=='all'&&r.statusClass!==cmp_f)return false;
    if(q){var h=[r.item,r.vendor,r.prId,r.team].map(function(v){return(v||'').toLowerCase();}).join(' ');if(h.indexOf(q)<0)return false;}
    return true;
  }).sort(function(a,b){var o={handed_over:0,delivered:1,cancelled:2};return(o[a.statusClass]||0)-(o[b.statusClass]||0);});
  document.getElementById('list-completed').innerHTML=filtered.length?filtered.map(function(r,i){
    var u=getUrg(r.urgency);var st=SL[r.statusClass]||{icon:'✅',short:r.statusClass};var id='cm-'+i;
    var detail='<div class="detail-grid">'+cell('PR ID',r.prId,true)+cell('Quantity',r.quantity,true)+cell('Vendor',r.vendor,false)+cell('Team',r.team,false)+cell('Estimate',r.estimate,true)+cell('Approval Date',r.approvalDate,true)+cell('Ordered Date',r.orderedDate,true)+cell('Lead Time',r.leadTime,true)+'</div>'+(r.justification?'<div class="just-full">'+esc(r.justification)+'</div>':'');
    return '<div class="item-card urg-'+u.toLowerCase()+'" style="opacity:.75;animation-delay:'+(i*.018)+'s">'+
      '<div class="item-hdr" onclick="toggleBody(\''+id+'\')">'+
        '<div><div class="item-tags"><span class="badge '+u.toLowerCase()+'">'+u+'</span><span class="spill sp-'+r.statusClass+'">'+esc(st.icon)+' '+esc(st.short)+'</span>'+(r.team?'<span class="team-tag">'+esc(r.team)+'</span>':'')+'</div>'+
        '<div class="item-name">'+esc(r.item||'—')+(r.prId?'<span class="pr">'+esc(r.prId)+'</span>':'')+'</div>'+
        '<div class="item-meta">'+(r.vendor?'<span>→ '+esc(r.vendor)+'</span>':'')+(r.orderedDate?'<span>Ordered: '+esc(r.orderedDate)+'</span>':'')+(r.leadTime?'<span>'+esc(r.leadTime)+'</span>':'')+'</div></div>'+
        '<div class="item-time">'+(r.daysApprovalToOrdered>=0?r.daysApprovalToOrdered+'d to order':timeAgo(r.timestamp))+'</div>'+
      '</div>'+
      '<div class="item-body" id="'+id+'">'+detail+'</div>'+
    '</div>';
  }).join(''):emptyHtml('📦','No completed items','');
}

function renderOverview(){
  var items=D.activeItems,sc=D.stageCounts;
  var total=items.length,slaC=items.filter(function(r){return r.slaFlag;}).length;
  var pend=(sc.pending_requester||0)+(sc.pending_sourcing||0)+(sc.sourcing||0);
  var inQ=sc.quotation||0,ordered=(sc.ordered||0)+(sc.paid||0),transit=sc.in_transit||0;
  var pastEta=items.filter(function(r){return r.statusClass==='in_transit'&&r.slaFlagType==='transit';}).length;
  var crit=items.filter(function(r){return getUrg(r.urgency)==='CRITICAL';}).length;
  var noV=items.filter(function(r){return !r.vendor&&r.statusClass!=='pending_requester';}).length;

  var lines=[];
  lines.push({t:'You have <span class="n">'+total+'</span> approved items actively in the procurement pipeline.'});
  if(pend>0){var ps=items.filter(function(r){return(r.statusClass==='pending_requester'||r.statusClass==='pending_sourcing'||r.statusClass==='sourcing')&&r.slaFlag;}).length;lines.push({t:'<span class="n y">'+pend+'</span> item'+(pend>1?'s':'')+' not yet initiated with a vendor'+(ps>0?' — <span class="n r">'+ps+'</span> <span class="act">past the 2-day SLA</span>.':' — within SLA.')});}
  if(inQ>0){var qs=items.filter(function(r){return r.statusClass==='quotation'&&r.slaFlag;}).length;lines.push({t:'<span class="n o">'+inQ+'</span> item'+(inQ>1?'s':'')+' in quotation'+(qs>0?' — <span class="n r">'+qs+'</span> exceeding SLA.':' — on track.')});}
  if(ordered>0)lines.push({t:'<span class="n c">'+ordered+'</span> item'+(ordered>1?'s':'')+' ordered/paid, waiting to ship.'});
  if(transit>0)lines.push({t:'<span class="n p">'+transit+'</span> item'+(transit>1?'s':'')+' in transit'+(pastEta>0?' — <span class="n r">'+pastEta+'</span> <span class="act">past ETA</span>.':' — on schedule.')});
  if(crit>0)lines.push({t:'<span class="n r">'+crit+'</span> <span class="act">CRITICAL urgency</span> item'+(crit>1?'s':'')+' need immediate attention.'});
  if(noV>0)lines.push({t:'<span class="n o">'+noV+'</span> item'+(noV>1?'s':'')+' have no vendor assigned — <span class="act">action needed</span>.'});
  if(D.vendorFlags.length>0){var tl=D.vendorFlags.reduce(function(s,v){return s+v.lateCount;},0);lines.push({t:'<span class="n r">'+D.vendorFlags.length+'</span> vendor'+(D.vendorFlags.length>1?'s':'')+' flagged for late delivery ('+tl+' items).'});}
  if(total===0)lines=[{t:'<span class="n g">✓</span> Pipeline is clear — all items completed or cancelled.'}];
  else if(slaC===0&&pend===0)lines.push({t:'<span class="n g">✓</span> All items are progressing within SLA.'});

  document.getElementById('insight-box').innerHTML='<div class="insight-title">What needs your attention</div>'+
    lines.map(function(l){return'<div class="insight-line"><div class="il-dot"></div><span>'+l.t+'</span></div>';}).join('');

  var buckets=[
    {icon:'🔴',title:'Not initiated with vendor',sub:'Sourcing not yet begun',border:'b-alert',cntCls:'bc-r',
     filter:function(r){return r.statusClass==='pending_requester'||r.statusClass==='pending_sourcing'||r.statusClass==='sourcing';}},
    {icon:'💬',title:'Quotation / Negotiation',sub:'RFQ sent or negotiating price',border:'b-warn',cntCls:'bc-y',
     filter:function(r){return r.statusClass==='quotation';}},
    {icon:'📦',title:'Ordered / Paid',sub:'Waiting for vendor to dispatch',border:'b-cyan',cntCls:'bc-c',
     filter:function(r){return r.statusClass==='ordered'||r.statusClass==='paid';}},
    {icon:'🚚',title:'In Transit',sub:'Shipped, awaiting arrival',border:'b-purple',cntCls:'bc-p',
     filter:function(r){return r.statusClass==='in_transit';}}
  ];

  document.getElementById('overview-buckets').innerHTML=buckets.map(function(b,bi){
    var bItems=items.filter(b.filter).sort(function(a,c){return(URG_RANK[getUrg(a.urgency)]||3)-(URG_RANK[getUrg(c.urgency)]||3);});
    if(!bItems.length)return'';
    var autoOpen=bItems.length<=6;
    var rows=bItems.map(function(r){
      var ds=r.daysSinceApproval>=0?'<span class="brow-days'+(r.slaFlag?' over':r.daysSinceApproval>2?' warn':' ok')+'">'+r.daysSinceApproval+'d</span>':'';
      return'<div class="brow">'+
        '<div style="min-width:0;flex:1">'+
          '<div class="brow-name">'+esc(r.item||'—')+'</div>'+
          '<div class="brow-meta">'+
            (r.prId?'<span>'+esc(r.prId)+'</span>':'')+
            (r.vendor?'<span>→ '+esc(r.vendor)+'</span>':'<span style="color:var(--red)">No vendor</span>')+
            (r.team?'<span>'+esc(r.team)+'</span>':'')+
            '<span class="badge '+getUrg(r.urgency).toLowerCase()+'" style="font-size:8px;padding:2px 6px">'+getUrg(r.urgency)+'</span>'+
            (r.slaFlag?'<span style="color:var(--red);font-weight:600">⚠ SLA</span>':'')+
          '</div>'+
        '</div>'+
        '<div class="brow-right">'+ds+'</div>'+
      '</div>';
    }).join('');
    return'<div class="bucket '+b.border+'" style="animation-delay:'+(bi*.05)+'s">'+
      '<div class="bucket-hdr" onclick="this.nextElementSibling.classList.toggle(\'open\');this.querySelector(\'.bucket-toggle\').textContent=this.nextElementSibling.classList.contains(\'open\')?\'−\':\'+'+'\'">'+
        '<div class="bucket-left">'+
          '<div class="bucket-icon">'+b.icon+'</div>'+
          '<div><div class="bucket-title">'+b.title+'</div><div class="bucket-sub">'+b.sub+'</div></div>'+
        '</div>'+
        '<div class="bucket-right">'+
          '<div class="bucket-cnt '+b.cntCls+'">'+bItems.length+'</div>'+
          '<div class="bucket-toggle">'+(autoOpen?'−':'+')+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="bucket-body'+(autoOpen?' open':'')+'">'+rows+'</div>'+
    '</div>';
  }).join('')||'<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">Pipeline clear</div></div>';
}

function emptyHtml(icon,text,sub){
  return'<div class="empty"><div class="empty-icon">'+icon+'</div><div class="empty-text">'+esc(text)+'</div>'+(sub?'<div class="empty-sub">'+esc(sub)+'</div>':'')+'</div>';
}

loadData();
</script>
</body>
</html>
